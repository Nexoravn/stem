<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Load All Courses (Collapsible)</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

button{
    padding:8px 12px;
    cursor:pointer;
    margin-bottom:15px;
}

.course, .chapter, .lesson{
    cursor:pointer;
    background:#f0f0f0;
    padding:8px;
    margin-top:8px;
    border-radius:6px;
}

.chapter{ margin-left:20px; background:#fafafa; }
.lesson{ margin-left:40px; background:#fff; }

.resources{
    margin-left:60px;
    display:none;
}

.children{
    display:none;
}
a{
    text-decoration:none;
    color:blue;
}
</style>
</head>
<body>

<h2>Auto Load All Courses</h2>
<button onclick="loadAll()">Nhấn để lấy khóa học</button>

<div id="content"></div>

<script>

const API = "https://api.empire.io.vn/api/v1/";
const FILE = API + "files/";

function toggle(el){
    el.style.display = el.style.display === "none" ? "block" : "none";
}

async function loadAll(){

    const container = document.getElementById("content");
    container.innerHTML = "Đang tải...";
    
    let page = 1;
    let hasMore = true;
    container.innerHTML = "";

    while(hasMore){

        try{
            const res = await fetch(API + "courses?page=" + page);
            const data = await res.json();

            if(!data.courses || data.courses.length === 0){
                hasMore = false;
                break;
            }

            for(const course of data.courses){

                const courseDiv = document.createElement("div");
                courseDiv.className = "course";
                courseDiv.innerText = "📚 " + course.title;

                const courseChildren = document.createElement("div");
                courseChildren.className = "children";

                courseDiv.onclick = () => toggle(courseChildren);

                container.appendChild(courseDiv);
                container.appendChild(courseChildren);

                const detailRes = await fetch(API + "courses/slug/" + course.slug);
                const detailData = await detailRes.json();

                detailData.course.chapters.forEach(chapter=>{

                    const chapDiv = document.createElement("div");
                    chapDiv.className = "chapter";
                    chapDiv.innerText = "📘 " + chapter.title;

                    const chapChildren = document.createElement("div");
                    chapChildren.className = "children";

                    chapDiv.onclick = (e)=>{
                        e.stopPropagation();
                        toggle(chapChildren);
                    };

                    courseChildren.appendChild(chapDiv);
                    courseChildren.appendChild(chapChildren);

                    chapter.lessons.forEach(lw=>{

                        const lesson = lw.lesson;

                        const lessonDiv = document.createElement("div");
                        lessonDiv.className = "lesson";
                        lessonDiv.innerText = "📖 " + lesson.title;

                        const resDiv = document.createElement("div");
                        resDiv.className = "resources";

                        lessonDiv.onclick = (e)=>{
                            e.stopPropagation();
                            toggle(resDiv);
                        };

                        chapChildren.appendChild(lessonDiv);
                        chapChildren.appendChild(resDiv);

                        lesson.resources.forEach(rw=>{
                            const res = rw.resource;
                            if(!res) return;

                            const link = document.createElement("a");
                            link.href = FILE + res.fileUrl;
                            link.target = "_blank";
                            link.innerText =
                                (res.type === "video" ? "🎥 " : "📄 ") + res.title;

                            const wrap = document.createElement("div");
                            wrap.style.marginTop = "5px";
                            wrap.appendChild(link);

                            resDiv.appendChild(wrap);
                        });

                    });

                });

            }

            page++;

        }catch(e){
            hasMore = false;
        }
    }

    alert("Load xong toàn bộ khóa!");
}

</script>

</body>
</html>
