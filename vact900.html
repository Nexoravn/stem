<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Course Viewer</title>

<style>
body{
    font-family: Arial;
    padding:20px;
}

input, button{
    font-size:16px;
}

.chapter-title{
    cursor:pointer;
    background:#f0f0f0;
    padding:10px;
    margin-top:20px;
    border-radius:6px;
}

.lesson-title{
    cursor:pointer;
    margin-left:20px;
    margin-top:10px;
    background:#fafafa;
    padding:8px;
    border-radius:6px;
}

.resources{
    margin-left:40px;
    display:none;
}

.lessons{
    display:none;
}

a{
    text-decoration:none;
    color:blue;
}

.resource{
    margin-top:5px;
}
</style>

</head>

<body>

<h2>Khóa học Empire Viewer</h2>

<input type="text" id="courseLink" 
    placeholder="Dán link khóa học Empire vào đây..."
    style="width:500px;padding:8px;border-radius:6px;border:1px solid #ccc;">

<button onclick="loadCourse()" 
    style="padding:8px 12px;border-radius:6px;cursor:pointer;">
    Load
</button>

<div id="course"></div>

<script>

const API = "https://api.empire.io.vn/api/v1/";
const FILE = API + "files/";

// Hàm lấy slug từ link
function extractSlug(url){
    try{
        const u = new URL(url);
        const parts = u.pathname.split("/").filter(Boolean);
        return parts.pop(); // lấy phần cuối cùng
    }catch{
        return url.trim(); // nếu chỉ paste slug
    }
}

function loadCourse(){

    const input = document.getElementById("courseLink").value;
    const courseSlug = extractSlug(input);

    if(!courseSlug){
        alert("Nhập link hoặc slug hợp lệ!");
        return;
    }

    document.getElementById("course").innerHTML = "Đang tải...";

    fetch(API + "courses/slug/" + courseSlug, { cache:"no-store" })
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("course");
        container.innerHTML = ""; // xóa cũ

        if(!data.course){
            container.innerText = "Không có dữ liệu khóa học!";
            return;
        }

        data.course.chapters.forEach(chapter => {

            const chapterTitle = document.createElement("div");
            chapterTitle.className = "chapter-title";
            chapterTitle.innerText = "📘 " + chapter.title;

            const lessonsDiv = document.createElement("div");
            lessonsDiv.className = "lessons";
            lessonsDiv.style.display = "none";

            chapterTitle.onclick = () => {
                lessonsDiv.style.display =
                    lessonsDiv.style.display === "none" ? "block" : "none";
            };

            container.appendChild(chapterTitle);
            container.appendChild(lessonsDiv);

            chapter.lessons.forEach(lw => {

                const lesson = lw.lesson;

                const lessonTitle = document.createElement("div");
                lessonTitle.className = "lesson-title";
                lessonTitle.innerText = "📖 " + lesson.title;

                const resourcesDiv = document.createElement("div");
                resourcesDiv.className = "resources";
                resourcesDiv.style.display = "none";

                lessonTitle.onclick = () => {
                    resourcesDiv.style.display =
                        resourcesDiv.style.display === "none" ? "block" : "none";
                };

                lessonsDiv.appendChild(lessonTitle);
                lessonsDiv.appendChild(resourcesDiv);

                lesson.resources.forEach(rw => {

                    const res = rw.resource;
                    if(!res) return;

                    const fileUrl = FILE + res.fileUrl;

                    const resourceItem = document.createElement("div");
                    resourceItem.className = "resource";

                    if(res.type === "video"){
                        resourceItem.innerHTML =
                            `🎥 <a href="${fileUrl}" target="_blank">${res.title}</a>`;
                    } else {
                        resourceItem.innerHTML =
                            `📄 <a href="${fileUrl}" target="_blank">${res.title}</a>`;
                    }

                    resourcesDiv.appendChild(resourceItem);
                });
            });
        });

    })
    .catch(err => {
        console.error(err);
        document.getElementById("course").innerText = "Lỗi khi lấy dữ liệu!";
    });
}

</script>

</body>
</html>
